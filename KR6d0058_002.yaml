body:
  text: 笠道生法師撰藥草喻品第五四大聲聞既悟於初譬次自説信解以表悟悟必是審深領聖説先三後一之意既領聖致之旨此品佛述可其言以成其義故讚言善哉歎其希有密牽不逮使行齊迦葉藥草者明其昔日曾受持於聖教聖教沾神則煩惱病愈故寄藥草以目品焉火宅至此是譬説法花也誠如所言如來智慧功德能説先三後一之道而迦葉向引譬自説説得聖旨故印可之誠如所言也如來復有無量功德向誠實蓋是一方之義斯則一方無窮一方無窮之義彌劫不盡廣成三化是一復何以過焉如來觀知一切諸法至一切智地所釋所以至於一切智地也一以窮法玄趣二以知衆生心行既知藥病相治服之必逾煩惱患滅終得一切智也譬如三千乖理為惑惑必萬殊反則悟理理必無二如來道一物乖謂三三出物情理則常一如雲雨是一而藥木萬殊萬殊在于藥木豈雲雨然乎今為異同説譬遠顯一致而迦葉領旨成其希有之極三千者舉佛化一境也山川溪谷明法澤曲沾無幽而不至也名色各異緣躰不同也密雲彌布遍覆三千雲為法身雨為説法法身周密彌滿法音普暢無偏也一時等注其澤普洽一時則無前後也等注渧無大少四等法雨理亦如之也一雲所雨一雲之雨明無異味水也彼種性雖別皆稱使得生也一雨昔化發其道牙為地今説扶踈其解為雨也如來亦復如是如大雲起法身彌綸慈蔭若雲也以大音聲理廣無量為大無不聞知為遍遍䨱人天令無煩惱熱也於大衆中而唱是言至為聽法故理顯灼然為唱必鍾於彼為語之道播天下有緣必聞謂皆應致此為聽聞法也爾時無數至聽法理説既招有教無類莫不同來如彼大雲引內義牽譬上合不自覺知一相之法理無異味衆生雖同沾道澤而莫知所以念何事衆生所念不同或戒或施故云念何事也思修亦爾云何念為以三乘心念檀那為以人天心念檀那思修亦爾以何法念以斯三乘果念檀那以期人天報念檀那以何法得何法總結向三番語也以何者以何善為因得何法者為得何果報耶如此因果皆趣於佛而衆生不知各執謂異唯佛了之同歸耳靉靆垂布喻應身接物似若近而可階也是名小樹欲明菩薩道勝更譬以樹樹者以蔭䨱為義大乘兼被猶若此也七住以下謂之小樹八住以上謂之大樹也授記品第六夫功成則果遂自然之曆數四大聲聞既殖根遐曩著于今記佛向述成其説説必當理理當則數鍾來果故佛為受記此授記法華也然事象方成纍之所得聖既會理則纖爾纍亡纍亡故豈容有國土者乎雖曰無土而無不土無身無名而身名愈有故知國土名號授記之義者應物而然引之不足耳爾時大目楗連至皆悉悚栗此諸人所以索記者明其內懷妙解理應得記故致索耳密牽未悟敦其悟解解意既精獲記亦爾二十小劫所以國有優劣壽有修短者聖豈然耶機須見之故示其參差化城喻品第七所以引大通智勝者有三意一以大通智勝亦説先三後一之教證成今説二以五百弟子及諸大衆昔已曾於智勝佛所受化於釋迦釋迦事須引古助成今悟三以生死際阻悠遠大道玄曠權假二乘為化城喻也彼佛滅度已來甚大久遠所以云佛滅度久者遠表釋迦鑒上古猶念今日以證今説理名當也垂得菩提而諸佛法不現在前所以言十小劫佛法猶不現前者明至理玄遠難可卛尅亦表大通志氣貞固心不可阻厲物如此生其企慕耳梵王雨華所以人天交萃設供如林者明至德威重理感天梵王是衆生之主尚來歸崇者況復餘乎有十六子引昔之緣事在此也爾時東方至光明照耀所以先照無遺者明道無不鑒十方梵天遠尋相者明有感必至何患遠乎不知光明相者明理踰情外又奉宮殿者表罔極之心捨深禪樂遠覲佛者以情存妙法故請轉法輪也三轉十二行牽昔況今義顯于茲大通智勝昔為諸梵王説三乘教又為十六王子説法華經最小王子釋迦文者已為時人曾説此法今既登極還成昔化復説先三後一之道三轉者第一佛告抅鄰身者是苦汝當知之則得眼智明覺四行成未知根第二告五人汝已知苦亦得眼智明覺四行成已知根第三告五人汝已知苦不復當知亦得眼智明覺四行成無知根一告四行三轉故有十二也如是未知苦當知未知習當知未知滅當知未知道當知如是一諦中有眼智明覺四行一告通四諦有十六行三告有卌八行法輪言十二者舉三告而言也言四十八者逐諦而言之十二因緣四諦者名略而事廣十二因緣者名廣而事略其根既利但為説十二生死其便自領必有離苦法藥謂盡道也無明百八煩惱隨事無量實而言之一惑而已無明者惑之通稱即是現在愛取愛取用廢事謝過去總名無明也行身口意業現在謂之有以能有來果果報既謝則功成事遂事遂過去謂之行行者遷流生死義也識識為今身之始即有來生事也名色識既為種能成名色四陰曰名五情為色亦曰在胎茫昧識苦樂微有名而已六入六情始萌便對六塵也觸情塵既著便有身識身識細滑三事和合和合觸義也受情塵和合便有適不次生三受也愛樂緣受適意曰愛愛則纏綿纏綿者生死根深故偏立支也取緣愛滯故則廣生四取取者能取生死也有緣四取故則造三業者謂之有能招來有也生緣有三業萌牙愛取水潤焉得不生邪老死既生安得不死此是愛悲之宅十二因緣三世並備但隨化迹隱顯其名耳何者二在過去八在即時二在未來也若由昔無明行招此苦器者今思斷之當來方無復生死生死是衆禍之宅可不畏哉故示此兩端庶尋言旨然三界飄流由十二緣緣若滅者則愚癡絶命於慧刀愛水燋乾於智火高羅四開於六趣無生超逸於八極矣十六王子童子出家向説二乘之教今為王子説法華也彼佛受沙彌請過二萬劫已明理深道遠要須詳審亦使物欽仰也即入靜室欲顯沙彌德也譬如五百由旬近情淺識之後取證昔説三教以表一物求旨保三為是復引曩緣作化城喻喻者明二乘非實終歸一道一道者為惑所得可謂艱難然三界塗岨二乘路險此五百是菩薩要道實難過矣曠絶無人怖畏之處五百懸遠為曠絶志在獨悟無人久受勤苦來害無方為怖畏之處也若有多衆欲過此道至寶處大悟分發為欲過嶮道欲過不少謂之多衆過則無樂不得為珍寶所也有一導師至欲過此難會理則通乖之為塞善知此相一人而已教衆從通為將道之主也所將人衆中路懈退至欲退還迷其趣必佛道遠久受勤苦生死苦急小乘樂交而便樂之為懈退耳雖有此惑終不失本解為欲退也退於師法是則于師而於師無隱義白如此也道師多諸方便至化作一城既于無隱放師為白師則從白得知慈其可愍也即以方便作二乘化言得泥洹城本防非唯泥洹無患譬之名焉權示非實為化作耳告衆人言至快得安隱二乘化旨假辭云爾若能至寶所亦可隨意二乘教旨令其得佛而不顯之亦假辭示也於是衆人至生安隱想行進成果自謂泥洹之義也爾時導師知此人衆至為止息且謂得泥洹為止於當進為息既知如此説三是一為滅化城而假辭云爾耳五百弟子受記品第八夫能對揚聖教影嚮其迹靡不是權此諸君子三聞方悟迹非先達故在後受記後受記者似真鈍器今既顯其權道非鈍明矣聞是智慧謂方便品至信解也神通之力見大智勝事由若今日也言不能宣謂己所懷妙解解從佛來成成功由佛故云於佛功德言不能宣密欲令佛顯其行迹明非小乘故言唯佛能知我等深心耳譬如有人五百羅漢機悟在後欣慨自責自責既深喜亦不淺如來著説言雖無方理無異歸而五百人乖言失旨有過之極故自引譬以申斯意也至親友家友者十六王子家者謂大教之舍五百人等原昔雖聞質是素糸有分趣染義至友家也醉酒而臥友訓辭義本充具乏未能忘言更以惑意惑意情熾醉於五欲生死若醉臥也是時親友官事當行至與之而去雖曰昏惑始寧無微解其解誠微大悟從起以果名因謂之無價為惑蔽之如在內衣裏由友而來則為友與理固無失亦友所繫密繫無差視莫過焉大乘言旨潛己己昧言旨為不覺知末後可化化感暫亡為官事當行也起已遊行至便以為足昔解緣發於惑得反為從臥起起則從教而所從非本謂之遊行二乘泥洹既非歸本為至他國為樂作行行乖大道於理有艱所所得之樂比大乘則少比世為足也於後親友會遇見之從教是己所攬尚未與昔友相見今説三為一方為見耳非意欲爾為遇會也而作是言咄哉丈夫至無所乏短我昔於大通智勝所以無價法寶繫汝心裏得一之意假辭如此以因易果無樂不得何所乏哉而尋廢忘昔受化時繫得微解尋著化餝或意為忘也授學無學人記品第九五百羅漢德充於內名流於外故在前受記此學無學名實俱薄故在後授記通是一段授記耳法師品第十上來至此凡三説三授記明三因為一因義相以訖三説者一方便品二譬喻品三化城品也信解品自審其解藥草品佛述其説非別科也三授記者一授舍利弗二授四大聲聞三授五百弟子及與學無學也此品大明流通茲經法師者無理不通為人能宣揚斯道謂之法師以獎于群情寧不益耶因藥王所以因藥王告者其能燒身通法故因之而告也一偈隨喜以少況多深有旨焉夫瞋心則與物隔與物隔者道無由行故歎隨喜喜則法華通也竊為一人説向明自受其功已多今言為一人説則是外益道貴兼被功報何極耳則如來使大慈之心恆以通法為懷若人能行法者便是如來使也如來所遣明其所解從佛解來從佛解來者蓋是如來以解資遂其行也如來本以通法為事而其能爾謂行如來事也若有惡人以不善心至其罪甚重佛是人天中勝嫉而罵之是則罵人非罵法也受法花人若罵之者是則罵人辱法罵人辱法則毀法身毀法身者其罪至重以敦學徒豈不弘哉則為如來肩所荷擔法是佛師常尊法以受法而擔義實擔法非擔人也而言迹在人亦爾以敦學也已説今説上章以人明法自下以法明人也以法難得受持人難得受持人難得者亦以法難信解故也以衣䨱之理深彌䨱衣以表之如來共宿夫人情疑意密則窹窹是同法花之人既解參玄極解會加心則為俱處俱處者共宿義也手摩其頭持法花人始是佛子鍾愛之至寄以摩頭也譬如有人渴乏須水受持法花求悟佛道欲得之至如渴須水此譬譬持法花人有淺深得失也上云不能得見聞法花經者非曰不得卷但未領一乘之旨謂之爾耳於彼高原穿鑿求之一乘比三乘為難信於法花求解如求水於高原受持讀誦為穿鑿也猶見乾土至知水必近未都玄門如見乾土轉得深致如見濁泥已知大悟不遠為知水必近也如來室者大慈心是慈能彌䨱如室因蔭室宜言入也如來衣者忍辱心是忍辱和悅如衣嚴身衣宜言著也如來座者一切法空是空則容安取譬於座座宜言坐以之施物不弘乎見寶塔品第十一所以現塔者證説法華理必明當一以塔證二以所出聲證物因二事信彌深至亦遠表極果微現常住也爾時佛前有七寶塔至從地踊出住在空中夫人情昧理不能不以神奇致信欲因茲顯證故現寶塔以事表義使顯然可見既云三乘是一一切衆生莫不是佛亦皆泥洹泥與佛始終之間亦奚以異但為結使所䨱如塔潛在或下為地所隱大明之分不可遂蔽必從挺出如塔之踊地不能得出本在於空理如塔住於空中發聲讚言善哉善哉以寄成證也又以衆寶莊校者遠表極果無善而不有於是其理從事顯然雖難不信其可得乎又聞塔中所出音聲至怪未曾有四衆既見塔出罔知所以便起而立故容肅貌欽聞其旨事在情表不敢發言也名大樂説乘衆疑而白佛顯所以之意也作大誓願多寶乘昔願而能爾者密引時心皆應發願欲見此佛身所以須覩形者顯證分明也分身諸佛還集一處然後我身乃出現耳豈是自貴而然乎將欲辨於真偽故須集耳既云十方是化斯則今釋迦是真真佛所説説必明當於是群情信悟彌篤故託多寶之願以集之焉時娑婆世界即變清淨所以除諸穢惡移于天人乃至施花香者遠表樂必可亡善必可修也更變二百萬億那由他國若為欲安分身諸佛便應預淨諸國使足容受何以漸漸變耶所以爾者欲表理不可頓階必要研粗以至精損之又損之以至於無損矣通為一佛國以表萬因雖殊終成一果也分半座所以分半座共坐者表亡不必亡存不必存存亡之異出自群品豈聖然耶亦示泥洹不久相也使企法情切矣以神通力接諸大衆皆在虗空所以接之者欲明衆生大悟之分皆成乎佛示此相耳持品第十二向既廣引譬況言持此經者難今藥王等諸大士自誓能持此經於後惡世流布之也於異國土此土人惡非羅漢能化故言於他國也不能之肯豈實然乎欲鄙過此土厲言篤席耳安樂行品第十三明三因為一因義畢此品向已明諸大士流布斯經衆聲聞輩亦於他國班宣此法中聞有欲傳此經者罔知其方故設此品教其方法若能安住四法者則身靜神定神定身靜故則外苦不干外苦不干謂安樂則能説法無惓故物蒙其益耳四法者一住行二親近處行親近處者能遠惡近理也心既栖理則身口無過身口無過第二法也三者心無嫉妬四者大慈心也三業既淨慈念又彌以此宣法不亦弘乎於後惡世云何能説是經前以經未難持若深難持則淺識自崖故問方法以引學者於惡世也於惡世欲通説是經當安住四法末世持經雖曰多惡若住四法末世則無苦矣住之必安故言安住教道之法其方如此一者安住菩薩行處親近處已入於理而履行之為行處也雖未入理親而近之為親近處亦是始終合為一事也住忍辱地至心亦不驚行處者始終以忍辱為主此五事是始也又復於法無所行向明理心之德今辨觀行之能四事是行處終也不親近國王王子親近處亦有始終不近起亂之處為親近理此下諸事是近處之始路伽耶陀謂破世間論義也逆路伽耶陀謂苦切論義也那羅等謂綵書其身為種種變五種不男一者生不能男謂天質乃莊直不能耳二者黃門器物少弱三者半月不能男謂半月變為女也四者妬故不能男謂其先不自能見他行欲即便生妬妬故乃能也五者精不能男謂他先觸己身方能男耳觀一切法空如實相自下十餘事其名雖多其實一空而已此是始觀未能入理為親近處終也偈言自下偈頌或廣或略或亦不頌可隨義制之若口宣説若讀經時不樂説人及經典過第二法者無身口過此雖不道身業偈中頌也此章或言心業者以成身口必無失耳非是明心也又文殊至無懷嫉妬諂誑之心第三法者意無嫉妬也此雖道口業為成心無過耳非明口也文殊至於在家出家人中生大慈心第四法大悲心者被物之大故在後明若能安此四法者則無怯弱乘斯弘教其實彌矣譬如強力轉輪聖王此譬捐喻法花經昔不與人而今與之也踊出品第十四此品壽量之胤序欲明三果為一果也前為因設序宜言花動地此品為果作序宜言大身菩薩從地踊出彌勒懷疑斯處不別彼亦顯常住之旨也止不須汝等所以止者為出六萬菩薩菩薩出故得顯長壽致也我娑婆世界自有六萬恆河沙等菩薩摩訶薩夫聖教抑揚莫能惻其深旨然既廣統前後意亦可領上勸護法今言不須皆有在也據衆生現惑致都佛泥洹法欲滅盡自應須護故有勸言以篤其情耳然衆生悉有大悟之分莫不皆是權菩薩無時非護復何假他方諸菩薩乎假他方者似化理不足故示踊出以表斯義六謂六道恆沙謂多地謂結使而衆生悟分在結使之下下方空中住者在空理也地裂而出者明衆生而悟分不可得蔽必破結地出護法矣彌勒不識一人者以其悟性非十住所見故也又踊出非佛而是菩薩者明此悟分必須積學以至無學也彌勒至心生疑騰衆心而疑疑於釋迦成佛始爾而所為之事甚多願決衆疑顯其宗極常住微旨漸現斯矣壽量品第十五夫玄鑒虗朗出乎像域之表豈有殊形方汱修短之壽哉然無不形而不壽者出自群惑聖豈然乎但惑者謂佛實壽百齡今祛其斯滯假長壽遣之故目此品名為壽量壽量者即是上品奮迅諸佛神通即是極果極果既顯非常住如何又且近情欣生惡死今云長壽敦其彌何矣誠諦之言彌勒懷疑請決佛將答之故三告者以理深道妙不可輕説也唯願説之其又三白者亦表傾渴之至也皆謂今釋迦氏至出釋宮群疑在此故稱而斥之今日據長壽為實以表伽耶是虗若悟伽耶之不真亦解長壽之非實故知修短在物聖常無為矣我成佛已來復過於此夫色身佛者皆應現而有無定實形形苟不實豈壽哉然則方形同致古今為一古亦今也今亦古矣無時不有無處不在若有時不有處不在者於物然耳聖不爾也是以極設長壽言伽耶是之若伽耶是者非復伽耶伽耶既非彼長壽豈獨是乎長短斯非則所以長短存焉如實見三界之相夫見實者無復不實之見本欲津實悟彼故隨彼所應而作方便亦雖不同而其旨不異但云見三界者已是見其外唱既有本庶尋言表也我本行菩薩道所成壽命本菩薩道時壽已倍上故知向雖譬塵數亦未盡佛壽之一豪今以菩薩形佛佛壽多耳譬如良醫乃至百數此譬譬佛實存而言滅也衆生昔受化是從菩薩生為子也二十為二乘百數明多據今治病為醫也以有事緣遠至餘國既以化此復應化彼而無息也諸子於後飲他毒藥藥發悶亂宛轉于地解微枉惑為飲毒藥乖理為他惑緣至為藥發受死生識為悶亂生死為宛轉于地也是時其父還來歸家本化理真為家彼受化緣至更還伽耶城目之為歸也諸子飲毒或失本心或不失者從受化以來恆習正道為不失本心乖之為失也遙見其父皆大歡喜至善安隱歸緣淺解昧微漸近理為遙見然同覩應形故皆歡喜莫不知禮敬供養讚嘆也我等愚癡誤服毒藥解緣已發真應訴謬假辭爾耳願見救療更賜壽命既訴求救救則更生慧命亦假辭云爾父見子等苦惱如是至與令服隨應説法皆有旨趣為味辭餝外悅為色義表裏董心為香言教顯無相混然之致為搗篩和合也而作是言至無復衆患令服意亦假辭爾也其諸子中不失心者至病悉除愈得旨為服惑除為愈餘失心者至而謂不美雖知是藥昧旨以為不美即作是言我今衰老死時已至如佛年具八十形如故車當般泥洹爾耳是好良藥今留在此六度大法不持之去理不可亡行之則存也作是教已復至他國遣使還告汝父已死實更餘化為至他國雙樹泥洹言迹都滅為遣使還告汝父已死也是時諸子聞父背喪至毒病皆愈見佛泥洹深悟非常始知佛語為美得旨為服也其父聞子悉已得差尋便來歸咸使見之既解玄旨為方見佛非形見佛於彼人中亦為歸矣虗妄罪不本以識受為心有濟物之實言雖反常理不乖真雖復終日説説而無虗妄罪也俱出靈鷲山佛於始感為出耳常在靈鷲山至衆生見燒盡既見佛之不在良以衆生穢惡以穢不在則無穢必在無必在穢故寄七珍明之寄七珍明之者明無名汝之穢耳本自不言其體非穢於無形而論亦何異穢質然則無穢之淨乃是無土之義寄土言無故言淨土無土之淨豈非法身之所託哉至於穢惡被燒自是衆生罪報亦何傷無不在無不淨乎是以衆生見燒而淨土不毀且今人情欣美尚好若聞淨土不毀則生企慕意深借事通玄所益多矣我常知衆生頌合説微也每作是念合爾名也分別功德品第十六夫因果相召信若影響上既聞壽命之説則盡心求益藉茲尅果其報彌矣今辨其參差故謂分別功德品也阿逸多宋言無勝彌勒字也得無生法忍實悟之徒豈須言哉所以廣引得悟者欲美此經體蘊衆解應物無窮密敦涉求之徒使持法花耳夫未見理時必須言津既見乎理何用言為其猶筌蹄以求魚菟魚菟既獲筌蹄何施若一聞經頓至一生補處或無生法忍理固無然本苟無解言何加乎進退無據而文言爾者良由經之所明理護十住彼雖不假而在假之位經識無施而有施之能以此示得事表經義若從知之豈能自已哉八生當得無上菩提者此就八住為語也八住以上既無復身何以得知其智明昧故寄之以八生知去佛久遠也一生者如彌勒當下謂之一生如是或二或三乃至八八者多生多生故知去佛遠知亦昧矣所以不言十生者十是數之一極是巨多之義欲表菩薩或纍缺少故寄之八耳又不言六徑其四生者欲表經幽邃引悟入深超至四生顯斯義焉從四生至一次第不越者欲明理轉深妙悟者亦少難可得速示茲意也聞佛壽命如來慧命也今既聞説壽即是服深般若故言那由他劫行五波羅蜜功德所不及一也能持此經兼行布施上來所説意在乎此內既懷妙解外又行六度心事俱奏則正覺朝夕八方之廣何足擬其明大隨喜功德品第十七原聖人設教豈但取益乎當時乃愛執來葉訓化蒼生上來明三果為一果義已粗畢此品欲明流通之人人欲通法要以欣喜為懷若有嫉恚之心則與物隔與物隔者道何由通故以隨喜目品也彌勒白佛其昔偏以隨喜為行今復問向茲義也得幾所福示其多少使物求之情篤至第五十所以據最後人者皆羡其初親聞智説喜心必濃若傳之餘人又復最後喜心則淡淡者功德亦薄今就不如者稱福報以自無量況初在聞之徒發初在坐不亦深乎四生衆生欲窮其多耳不如第五十人聞法花隨喜上所明四果功德斯則有限量法花為理圓通無極人能隨喜斯則如來道遂道遂由乎此人者其功安可迮耶故言百分千分不及其一豈虗也哉終不瘖啞法花之報豈政爾耶乎但就人情所樂故言得乘寶輦口氣不臰無諸可惡耳而於大衆為人分別此語後品上無廣説向所略明者展轉説隨喜流通為多哉法師功德品第十八前法師品者為通三因是一因此品為宣三果為一果亦辨法功報也若讀若誦若説若書名法師品云而於大衆為人分別今廣之焉八百眼功德至意功德如説修行法花報者大明慧是此慧能無不見能無不知若任其極慧則冥然施物故抑使在人樂若可階寄報六情取引學者學者之即欣欲修經及其行積乃獲所以處矣其寄六情者見色則應在眼知法則應在意既云學得不可令無不見知故常通之眼止見於三千據得言生身生身粗近故言猶未得法身考而論之三千既然十方有何異哉斯則法身體極照也三根明功於讀説故示數不同總明可一別明無量蓋是近侍之數耳私尋品旨者遠採言外也千二百功德據十善為義自行教化讚嘆隨喜各有十善合四十也一善又能兼行十善四十善一一皆爾合四百善四百善各有上中下品則千二百也三根不如得中下二品八百善也餘根勝故故千二百也變成上味資益潤我得甘露味在己然其得報本不苦澀豈有變乎而言爾者汲引近情故云變耳聲香者若論其報亦同斯義豈名惡耶但天下聲香有好惡菩薩聞之亦何傷乎常不輕品第十九法花尊經者是衆善之源極慧之潤逆則獲罪若山順則到福如海前雖有其言未有其人故引古證今使信者增至若毀逆之罪如跋陀婆等順之福如不輕菩薩既欲證經故設此端示罪報者以排其疑謗現六根果者欲明其淨信亦表罪福影嚮理不可差洗學之子可不慎哉罪報如前火宅中説也如來神力品第二十明因果既竟斯則理圓事畢道言德行備宣下然夜光多忤玄唱逆耳至於濁末取信難將付囑法花故先現踰神力令衆喜悅發其奇想遠使十方稱南無歸命於後致信無間然矣出廣長舌表言無虗也一切毛孔放光表一極之無不照也謦咳彈指上現舌相放光顯言不虗妄慧照無遺道既如此明理暢黃中理暢黃中者寄以謦咳然黃中之唱言必有旨復託以彈指理既宣揚於下故云此二音聲遍至十方十方衆生感悟分發為六種震動也皆共遙散娑婆世界此諸衆生雖無明於預然有善緣於遙觀以種種寶物遙供養者以送極此假相見者欲明道無隔也如一佛土情鍾內至有感外發寶帳䨱此諸佛乃令十方為一者自非懸誠感至孰能如此乎遠明因萬雖殊終歸一果矣屬纍品第二十一前説因之時亦並已付囑義既未周不別立品今明因果俱竟理説都畢斯則如來大慧於然今持此經摩頂而付者以理深事大要惣為是義故立品耳藥王本事品第二十二上明因果理一則無異趣宗極顯然領會有在自下均三人為一人明二乘之子不得不同為大也説經既竟今明流通之人前來非不有證行經者今者標數人顯其行迹以證法華此諸人昔已於他國宣布茲典今又於此傳持斯經令道化沾澤於當時德芳流聲於千載使向方之徒準而則之矣今出其昔燒身之行謂本事也燒身者人所寶重莫過身命而燒者良由更有重身之寶矣若能領斯意者雖在其形恆是燒理為乖其旨雖復終日焚燎常不燒庶得迹外勿滯於事所以聖人責意義顯於茲也復生日月淨明德佛國爾人因不虗殖果不空應以篤洗求之子可不深修德行以招妙極耶故引斯事欲為明證也妙音品第二十三時衆聞説藥王本事再稱美法花功德益加信敬咸欲護持宣傳流布之方必有所因所因之行大莫通現一切色身三昧色身三昧者即法花慧也人能光揚法華則現是三昧便殊形改狀無方説妙音大士親是其人託迹往來以宣此經其之為益豈不深乎放眉間光照彼國者欲令妙音來也化作衆寶蓮花將欲來故先現衆花妙瑞使此土衆生發傾渴之想也多寶如來當為汝等而現其相所以今多寶為現相者一明多寶為法花而來二明諸佛道同也觀世音品第二十四夫聖人懸燭權引無方或託神奇或寄名號良由機有參差取捨不同耳所以偏美觀音名者欲使衆生歸馮情一致敬心濃若能推敬於一者則無一而不然矣勸物之爾豈偏勝乎曲濟無遺謂之普從悟通神謂之門受諸苦惱聞是觀世音菩薩名者皆得解脫聖人振初理不無根苟內無道機聖則不應矣豈直稱名便得解脫乎而今云爾何耶觀世音者以無不通為理無不濟為懷物有悟機扣聖聖有遂通之道遂通之道既申爾乃解脫豈虗哉美名獎物不亦弘乎應以佛身得度者妙音菩薩現種種身者以得色身三昧也今觀音亦現種種形而説法者皆由宣法花故人異道同示修必得也陀羅尼品第二十五夫因緣曆數符若影響吉凶禍福豈可避哉但玄言理説妙絶群庶致令近識受持心薄欲寄之呪術以敦時情外國之人信畏禁呪禁呪之法能排凶招吉無所不制末世多畏莫不懼害而修善是以聖人愍其愚冥為説其方昧理望連者慓然信至故借呪名以詺理説理説無處更成名實又吉凶之來關於鬼神因用其語訓令莫害畏纍懼害者無不修經修經既至自然潛語潛語之解既著凶自亡矣今以法花宗極寄呪而説之人欣呪之益樂於交利於是傾誠受持彌篤呪理雖一制辭不同既有左右唯付在佛故復因茲得言若于佛説如有後逆必不輕若護持呪謂陀羅尼也呪是鬼神之語不可傳譯也富單那世間不祥之鬼因病之必死吉遮起尸鬼也毗沙門北方天王也主領二鬼夜叉羅剎東方持國天王領二鬼揵闥婆毗舍闍南方天王領二鬼鳩槃荼餓鬼西方天王領諸龍緊那羅也此四天王各制御其所領也羅剎女等此十女鬼於天下有大勢力是衆鬼之母恭順佛命亦説此呪鬼雖凶惡不違其母既順佛子斯從也奪一切衆生精氣人心有七渧甜水以養人命若羅剎入人身中飲一渧則令人頭病飲二三四渧則悶絶然故可治過是必死是為奪精也阿跋摩羅此鬼入人身中令人手足筋轉口中吐淡熱病鬼也若鬼形作此諸形來侵病者阿梨樹枝落地時必作七片故以之為喻也油殃外道多謂一切草木有命諸鬼皆信此語故以𭼩油罪恐之妙莊嚴王品第二十六法花妙道既深且遠加之藥王諸人為宣流之者斯則人高理遠冥然絶群近識之徒斂兮而反雖欲通經不敢曆心故引妙莊嚴王妙莊嚴王者昔是邪見邪見既反則宣揚法花凡識於是發心通經權迹敢與所濟實多兼明善知識義遠顯切磋之美也序往昔之緣本事也普賢菩薩勸發品第二十七人情昧皎信良難要須曲尺無方寄迹事證事證既顯信心方濃耳普賢菩薩本立誓願若有讀誦法花經處我往勸發示其謬誤謂之勸發品物欣靈瑞之應於是修經必彌勤篤矣
