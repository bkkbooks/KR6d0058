body:
  text: 笠道生撰夫微言幽賾妙絶聆矚致使採玩者寡撫哂者衆豈非道而俗反者哉余少預講末而偶好玄俱文義富博事理兼邃既識非芥石難可永紀聊於講日疏録所聞述記先言其猶鼓生又以元嘉九年春之三月於盧山東林精舍又治定之加採訪衆本具成一卷庶釆悟君子脫有省者望領久繫表不以人徹廢道也妙法夫至像無形至音無聲希微絶朕思之境豈有形言者哉所以殊經異唱者理豈然乎實由蒼生機感不一啓悟萬端是以大聖示有分流之疏顯以參差之教始於道樹終于泥曰凡說四種法輪一者善淨法輪謂始說一善乃至四空令去三塗之穢故謂之淨二者方便法輪謂以無漏道品得二涅槃謂之方便三者真實法輪謂破三之僞成一之美謂之真實四者無餘法輪斯則會歸之談乃說常住妙旨謂無餘也此經以大乘為宗大乘者謂平等大慧始於一善終乎極慧是也平等者謂理無異趣同歸一極也大慧者就終為稱耳若統論始末者一豪之善皆是也乘者理運彌載代苦為義也妙者若論如來吐言陳教何經非妙所以此經偏言妙者以昔權三之說非實今云無三斯則言當理愜無昔虗僞謂之妙耳法者體無非法真莫過焉蓮花者嗟茲經也然器象之妙莫踰蓮華蓮華之美榮在始敷始敷之盛則子盈於內色香味足謂之分陀利無三之唱事同之也虗談既亡真言存焉誠言既播歸一之實顯乎其中矣經者世之經緯成自素帛斯之經緯顯乎行者真光之綵也序品者夫與言立語必有其漸將欲命乎微言故顯瑞於先斯則衆篇之挊胤法花之日月亦駭物視聽肅其欲聞之情也此經所明凡有三段始於序品訖安樂行此十三品明三因為一因從踊出至于屬纍品此八品辨三果從藥王終於普賢此六品均三人為一人斯則蕩其封異之情泯其分流之滯也如是者傳經者辭也所以經傳遐代休音不絶者有由而然如世有符印則無關而不過經以五事印其首者亦令斯道無難而不通矣如者當理之言言理相順謂之如也是者無非之稱此目如來一切說也我聞將欲傳之於未聞若有言而不傳便是從設不在能說貴在能傳可謂道貴兼忘者也廢我從聞聞從於佛來明出非己心故經傳歷世妙軌不輟也一時言雖當理若不會時亦為虗唱故次明一時時者物機感聖聖能垂應凡聖道交不失良機謂之一時佛在王舍城法身雖無不在若不記說之處猶為猛浪不得不序之證說此山有五處於何說耶耆闍崛山精舍也與大比丘衆若聞而獨由亦難信縱使我等及凡未勉於獨明共聞之人皆是我上舉以證經比丘者破惡之通稱也所以先烈聲聞後菩薩者斯則內外之異內則有局外無方故宜爾也亦表佛化自近而之遠道無不在矣大者於九十六種為其最也阿若憍陳如阿若宋云得無學智也憍陳如姓也最初得道因為名焉摩訶迦葉摩訶大也迦葉姓也其既年耆兼復懷德故云爾也迦葉婆羅門姓優樓頻螺優樓頻螺木苽林也其常住此林以處為名伽耶迦葉伽耶城名也住此城側即以為名那提是河名也生此河邊因以為字舍利弗是母名也其母眼似舍利鳥因為名也弗者子也舍利母高才善論天下所識故因母名名舍利也大目楗連字拘律陀出婆羅門種姓也摩訶迦旃延南天竺婆羅門姓即以本姓為名阿菟樓䭾宋云不沒劫賓那是字也無語譯之憍梵波提憍梵名牛波提曰足生即腳似牛足因號其為牛足離婆多宿名也此宿出時生即以為名畢陵伽婆嗟畢陵伽字也婆嗟姓也薄拘羅名肥盛也摩訶拘絺羅名大膝也難陀名歡喜也即是佛弟也孫陀羅難陀名柔濡端政歡喜也富樓那姓也彌多羅尼子亦云滿願彌多羅尼母字也其母辨才大智多人所識母貴其母故稱其姓因母為名名子也須菩提名善吉亦曰空生阿難色㒵端政人見歡喜也是佛成道日生故謂歡喜羅睺羅宋云不放六年在胎謂之不放衆所知識此諸聲聞德著於內名揚於外遐邇傾心孰不識哉所以列名歎德者大明小乘之法即菩薩道也摩訶波闍波提次列尼衆摩訶波闍波提宋言大愛道羅睺羅母耶輸陀羅宋云持勝遠聞菩薩八萬人聲聞本以盡苦為義故先言纍亡菩薩之道發心兼被不存袪結唯欲濟物之然方其唯總持乃至四辨故先序其振秡之妙術終云度人無量也供養諸佛此言昔因之行也以慈修身自下明菩薩三業之功也愍育弱喪以慈修身也言身兼口意也通達大智此語其自己之所得於下為通達耳到於彼岸窮其所到云爾名稱普聞德著於內名流于外功名既著則流聞於外釋提桓因是第二天帝領四鎮天王勑制諸龍鬼不妄犯衆生然恆修功德致令日月精明其屢為對揚之主故建初言之八部鬼神神者能殊形改狀或天或人故於二者中間次序之焉四大天王須彌山東名提頭賴吒南名治國西名博叉北名毗沙門是帝釋所領八龍王此諸龍王皆名觀喜現為人身居王舍城若天亢旱國王大臣皆往求之便降甘雨雨潤一國人見欣悅故名歡喜有四緊那羅王宋云人非人其形端政而頭有一角是天帝執樂神也有四乾闥婆王亦是天樂神但無角為異耳阿修羅王阿云無也修羅曰酒其昔是婆羅門種淨行不飲酒曰為名焉迦樓宋云空行金翅鳥神也韋提希子阿闍世王韋提希母字也阿闍世王宋云未生怨也懷任時常有惡心於洴沙王故名未生怨也韋提所生故謂韋提希子也爾時世尊四衆圍繞至德既重威踰日月故使人天交萃有心同仰慶沾蒼生令虗往而實返也供養恭敬供養以捨財恭敬以肅儀尊重讚歎尊重者崇貴之意情踰君父讚嘆者既欣德在內流詠於外也說大乘經三乘外順迹與理反執文乖旨則何能不駭一乘之唱將說法華故先導達其情說無量義其既滯迹日久忽聞無三頓乖昔好昔好若乖則望岸而返望岸而返者則大道廢焉故須漸也無量義者是相皆無無有多少深淺也唯說趣佛之行耳言旨有實謂之義無量理廣而脫長塗之苦為大乘也唯菩薩能學為之說也教菩薩法菩薩未盡理應以教之佛所護念佛盡理全為護永無忘失為念無量義三昧夫動靜唯物聖豈然乎窮理盡性謂無量義定從此定起凡有所言不容有謬故須明之曼陀羅華既入至定則神感天地天為雨華地為振動天地既感人安默乎嘉瑞既祥必有非常之說時情傾想致疑亦深深疑既積悟亦淵矣天雨四花以表四果之非實地動者以表四果之非住亦顯六道大悟分發兼明無常也一心觀佛知必異說遲聞奇唱眉間白毫相光以表一乘中正之道無二乘垢翳顯之在額示功平之相斯光既耀斯智必被矣照東方東方為群方之昔以表一乘為三乘之妙亦明悟大者冥故不盡照也萬八千向雖照一方欲明斯光能無不照故寄之萬八千表照無不在一也上下洞照者明道無不在矣盡見彼土所以彼此相見者以表正道虗通無障礙無壅滯六趣衆生所以見六道者明由惑故有此又見諸佛既見六趣之惑必應有反惑之者反惑之者其唯佛也及聞諸佛所說經法欲反迷之解必須聞法次言聞說經也諸修行得道者悉是返迷之徒種種因緣明衆生神機不一取悟萬殊或因施戒或緣神變故言種種復見諸佛涅槃者示彼以方此也當知釋迦泥曰不久乃遠屬物心篤其求法耳彌勒作是念至而有此瑞群情懷滯既久固執意深忽見向之奇相抱疑茫然彌勒既位居補處有心同推騰于時心乘機而疑疑既深積招悟亦速矣彌勒為疑主者以其求決之人必得明當也而問文殊至放光明前所以先入定雨花動地者將為顯於一乘故表一乘之光在後也然一乘是與會之本意是以彌勒今先問放光互舉前後各有義旨次應問雨花動地略而不言偈中當備問之以偈問曰偈頌之作凡有四義一為後來之徒二為未悟之屬三以長行略故偈以廣之四以罔極之情詠歌手儛彌勒向雖粗問其要今備言其事也所以先標文殊名者使時情注其耳目欣仰既至後聞其言情無間然矣今當略說見聞既廣難以言備我見彼土自下多頌上種種因緣種種信解種種者或戒或施其事非一下所列六度諸行乃無次第可以意消息之所以令此時會見彼善惡者欲使去惡修善亦表智光無所不鑒也文殊師利語彌勒如我惟忖夫玄理幽淵出乎數域之表自非證窮深理何由暢然欲申之也必託郢匠於文殊尚惟忖者明了必在佛蓋敦信情也自下凡有四段證當說法花初段者文殊知理既微妙不敢指斥詳而發言故云我今惟忖欲說大法諸善男子我於過去諸佛曾見此瑞第二段引古以證今也古今雖殊其道不異昔瑞如茲即說大法者當知今釋迦之瑞必說法花明矣向直言曾於過去而已下將引誠事謂日月燈明是也如來隨義說則稱謂無量今但言十方何耶十者數之滿極表如來理圓無缺道無不在故寄十也如來者萬法雖異一如是同聖體之來來化群生故曰如來應供至道良田能生妙果相纍兼忘可謂供養正遍知智無不周曰遍此知無邪曰正明行足身口意業隨智慧行謂之明行足者慧既遍知行亦備足矣善逝存亡為物無非饒益迹盡雙樹為物而逝物因此益非善如何世間解者謂五陰為世間如來達於世間又解結縛無上士人高道絶莫之與等調御丈夫身口諸惡儱悷難調佛能伏之又以調物可謂丈夫也天人師既盡調御之妙術乃可為天人師佛世尊佛者謂覺覺悟生死備上十德總謂世尊初善謂聲聞中善謂辟支後善謂菩薩次列三乘人出其事也昔亦說此三化義同今也如是二萬佛所以乃引二萬佛證釋迦者密表二乘之化以荃一乘之美故須廣引諸佛其人彌多其道彌一矣有八子所以傍出八子者有二義一以證文殊情綜終古乃是燃燈之師然燈又是釋迦之師既爾文殊發言豈有謬乎二者逆為長壽開漸目是時日月燈明佛說大乘經第二段引彼現在證今時之瑞是同妙光有八百弟子所以出八百弟子者欲明彌勒非唯當今咨問於文殊在昔已曾師受今復推問者明必當矣是時日月燈明佛從三昧起第四段彼方時之說此將欲說六十劫豈實然乎表重法心至故寄時云爾中夜入涅槃篤其求法情至所以後記德藏作佛者引自崖之徒其忽聞佛將泥洹謂後無聖便息駕於行道復記德藏作佛求名利世人多樂存近而廢遠今故貶之誡人剪此心而說偈言偈頌之法或略前而不頌或前無而偈有亦難為定准可臨時而制宜諸法實相義無二乘之僞唯說大乘之實相方便品第二昔晦迹三乘群徒謂是今欲顯乎一實示以真正以非明是故標方便目品既指昔三乘為方便所以一顯茲處不言而自顯若云一乘品者理似可一故言方便乃表絶歎之致矣從三昧安詳而起夫幽致既寄邃言亦深上所以雨花動地彌勒懷疑文殊決者豈非鼓發群迷虗蕩其情乎其心既曠則堪受一乘且聖人設軌順感而然從定起而發言言必冥當冥當故受者之心自然篤矣告舍利弗所以告之者其迹在聲聞可以級近實照踰人可為對揚也智慧甚深言雖萬殊而意在表一物乖言旨於智成深非因是智深物深於智耳乃是傷不逮之辭豈是歎智耶其智慧門夫智在說說則為門非唯智不可解門亦難了了門則達三非非難解如何一切聲聞辟支佛所不能知然則三乘皆權而大乘不乖所以大故不言之二乘正反於大致言不知也所以者何至未曾有法若不明所以豈能信之必須重釋積行如此所得造極為未曾有可非量者今智慧句此以因釋果隨宜所說言迹外順從迹必昧旨昧旨則難解此合智慧門句既釋所以微旨轉頭吾從成佛已來至令離諸著向總歎佛智慧此說就釋迦為語品目之作生此句也上言隨宜或以生著須更明之言隨宜者隨病所宜病有萬端教必無方皆是引導離著為本一日不然著無離理故云成佛已來所以者何至成就未曾有法內窮方便知見外言無非巧度又明所以窮於方便者良緣照圓無㝵造極故也禪定功德深入無際者釋知見波羅密所以具足也種種分別巧說諸法既云無方其辭似乖理當又須更明三乘之異謂之種種以三表一謂之巧說萬辭同當更無異味順彼無逆謂之悅可衆心向明內解此明外化止舍利弗不須復說既明三乘不實次應明是一乘雖言不實猶未有所當未足駭其執是之心若復說者必應驚疑故呼言止豈曰不說遣其疑耳向雖未指斥言一然粗已示意故云不須復說實相無二乘之僞唯一乘實也如是相性此十一事緣語萬善也如烟是火相能燒是性相據於外性主於內體性相之通稱力作有能未用謂之力造用事施謂之作因緣能生為因扶踈為緣果報情期尅遂謂之果歷數所鍾謂之報本末萬善之始為末佛慧之終為本唯佛了此諸義曉其源極故總結云究竟等除諸菩薩衆信力堅固者佛昔說三而今言無又未道一此意難測測之者寡故廣列諸人堅固者八住以上唯其能測佛當說一乘故云除也二乘居然不測新發意菩薩性解之徒不退菩薩初住至七住豈曰不知欲高美一乘使人崇信故云爾耳語無異理唯一極言符乎理故云語無異爾時大衆中至千二百人佛向止而不言者欲扗其疑心而今尤更疑昧是諸聲聞既聞佛廣歎此道甚深罔知斯旨所在一解脫義我等亦得此法三乘功德雖曰優劣之殊及其涅槃永息之處不異故言一解脫既同而向所讚嘆殷勤之至罔知是義所趣舍利弗知四衆心疑騰乎時情乘機而疑疑心既積求決之意亦至矣道場所得法道高理遠孰能問者佛若不說迹似悕法故世尊從三昧起無問而自說歎諸佛智慧甚深無量此頌之也佛告舍利弗止止不須復說佛前止者意欲以止止疑身子云說乃止疑故重請二言碩異而遣疑是同爾時世尊告舍利弗汝已殷勤三請夫聖人設教言必有漸悟亦有諧既致三請群疑宣液群疑宣液則欣聞之心無間然矣所以三請者非聖欲然機須爾耳自下凡五段明義一者辨真僞之別二者正明宗極一致之道三明三世諸佛軌則玄同四明所以說三乘者非聖欲爾出不獲已五明得失之人五千人退者此第一段辨真僞之別正言將奏真僞自判譬猶日月既耀皂分明所以示此迹者誡肅時情耳若增上慢人不預嘉會者時情慶至自鞕信悟矣爾時佛告舍利弗至無復枝葉第二段自下明一致之道繁柯既亡貞幹存焉隨宜所說適物而言雖復說三而情存表一故言意趣難解唯以一大事因緣故出現於世上已髣佛示宗此則復為說也既云三乘是方便今明是一也佛為一極表一而為出也理苟有三聖亦可為三而出但理中無三唯妙一而已故言以一大事出現於世欲令衆生開佛知見故微言云旨意顯于茲此四句始終為一義耳良由衆生本有佛知見分但為垢障不現耳佛為開除則得成之一義云初住至七住漸除煩惱曰開無出照耀曰清淨欲示衆生佛之知見向言本有其分由今教而成成若由教則是外示示必使悟悟必入其道矣一義云八住得觀佛三昧常樂示佛慧悟知見一義云九住菩薩為善慧深悟佛之知見也入佛知見一義云十住菩薩以金剛三昧散壞塵習轉入佛慧由論躰況階級如此丈而辨之就行者一悟便有此四義也若二若三二第二乘也三第三乘亦應無第一第一不乖所以大故不無之既無二三一亦去矣舍利弗一切諸佛法亦如是第三段引十方三世諸佛為證三世諸佛皆先說三乘後明一極雖復世異人殊然斯道玄同矣舍利弗諸佛出於五濁惡世第四段明聖人非自欲設三教但衆生穢濁難以一悟故為說三乘出不獲已豈欲爾乎劫濁上代衆生稟質清虗纍亦微薄以今比之謂為濁耳劫者時也衆生既惡或遇刀兵或遭穀貴病疫時也煩惱濁群惑交萃道何由生衆生濁總五盛陰惡也見濁五邪見本背真違理故別立之命濁邪命交違乎值道非濁如何於一佛乘分別說三佛以濁世人無大志而所以佛理幽遠不能信之抑使近人作三乘教耳雖曰說三恆是說一今云於一人身得佛豈不抑使近人乎迹近在人外示易學苟能以易而學自然之遠又云二乘同盡於結不除習去人轉近尤易滅也若能以易滅而求自然之於都滅斯則於一佛乘分別說三也舍利弗若我弟子自謂羅漢第五段辨人得失欲使道行天下豈容不辨得失誡人於捨失而從得若謂是羅漢而不知佛但為化菩薩者則非羅漢此是過失之人也能持此經謂之得除佛滅度後現前無佛二聖之間既無聖主容可不信若佛在者必信無疑密牽時人及佛現在何可不信邪偈言次第頌前五科初正四偈頌第一真僞次卅五偈頌第二一大事次七十五偈頌第三世諸佛證次兩偈頌前第四段出不獲已說三乘最後五偈頌第五得失人受胎之微形在三界惑內謂之微耳唯法身為大更以異方便助顯第一義理本無言假言而言謂之方便又推二乘以助化謂之異方便一乘既深假之以顯一義云四十九年所說是方便今說法華謂異方便若有衆生類至有人禮拜自下明衆生於過去佛殖諸善根一豪一善皆積之成道知法常無性第一空義明理無二極矣佛種從緣起佛緣理生理既無二豈容有三是故說一乘耳是法住法位世間相常住釋向知法常無性以此義故知常無性於三七日中初七日觀樹者欲表報恩中七日經行者既由經行大悟蔭樹成道此恩那可不報邪後七日思惟度衆生梵王請法乘感而化耳譬喻品第三夫根有利鈍則悟有先後向正說法花利根之徒取悟於上矣昧者未曉故寄譬說之理既幽邃難以一隅故曲寄事像以寫遠旨借事況理謂之譬喻舍利弗踊躍自下至火宅初凡有三段明義第一明舍利弗懷悟於內發解於外昔疑既重殷憂亦深今既首悟一乘表喜踊心溢不勝其欣自說云示託迹權引遠敦時情所以者何至失如來無量知見自說所欣本欲明之欲明之旨容助成所聞如是法者聞一切衆生皆當作佛見菩薩受記便自感傷獨不預之今聞符昔故過耳便悟昔慨失大今悟必欣矣我常獨處山林樹下至非世尊咎又所以聞即悟者良由昔來每作是念我等同入法性如來豈限之以必小是自取小耳所以示者夫說法以漸必先小而後大若我待於說大必以成大直過聞說小便謂是實小交利取證常自咎恨今聞是一與同入法性不差故即悟也意自非小徒自咎恨今悟如此致欣何已哉待者亦云當待爾時佛告舍利弗吾於天人沙門第二段明既無小道唯趣于佛也身子積悟冥著故與其受記受記之唱豈實爾耶以引希記之徒耳曾於二萬億佛至佛所護念因其自悟喜反譏以成之小乘昔無大望今偏授記者明理中無小所以遠引昔行者明功招斯記非曰有情為密牽時情心也以本願故說三乘法三乘之化本為濁世其土既淨不容有三而言三者欲明三即是一更無別三其本解三即是一故言以本願耳豈曰實說三化乎授堅滿記所以又授堅滿記者證身子得記不虗爾時四部衆至心大歡喜第三段引自岸之徒知皆有此分故歡喜也舍利弗白佛言我無復疑悔夫德厚則憂深道大則兼王身子啓悟已畢欲令有心同其玄解故為千二百騰疑白佛此諸聲聞既無昔疑而有今執必須開張然後乃釋耳聞所未聞昔餐于三而今服一同是聖言而先後鉾楯故結疑於其聞也智者以譬喻得解向言以挫其抱疑今云智者以牽其意智以背愚為性既曰智者聞譬心悟以此言斥之厲其速悟耳若國邑自下義況凡七段明理一者明宅中灾患𥪰興群禍交萃二者覺茲患禍其唯佛也三者佛既自覺又興大悲濟諸子四者將與三乘之樂故先說宅中怖畏之事五者與三乘之樂也六者與其真實一乘至樂也七者上許三車竟不與之事以虗妄也國者對城處所衆生在三界城內謂之為國第一段也邑者十無極極譬邑有限近人譬之聚落同語一城隨義逐事則萬端名生也有大長者佛應統之是其所崇為長者也其年衰邁現身後邊以設三乘之教也財富無量說法資慧命為財理無窮限為無量多有田宅及諸僮僕化去其穢生其道牙為田來居其為宅從教作行為僮僕無處非是為多也其家廣大以或為本而安之是家之義也或無方所為廣大也唯有一門佛教通悟為門唯此乃通為一百二百天為一百人為二百三惡趣為五百依界為止也堂閣朽故欲界為堂上二界為閣漸衰為朽故也墻壁頺落群或四統謂之為牆為不善所尅謂之頺落柱根腐敗邪見住之為柱乖理非堅為腐敗也梁棟傾危楪在𪪧愛為梁棟理易可奪為傾危周匝俱時焱然火起焚燒舍宅衆苦譬火燒無處不示為周匝出於橫造為欻然事至為起燒五陰舍也諸子一十草或至卅已曾受化為子也有三乘之別為三多故為十也長者見大火從四面起即大驚怖第二段佛覺斯苦也本化不應有苦為驚受苦昏意恐慧命遂盡於火故怖也而作是念我雖能於所燒之門安隱得出佛應形在宅亦示有苦現入泥洹惠命全為出有餘之力得至無餘為能亦從先佛教為能於所燒之門得出而諸子等樂著嬉戲情遊五欲為嬉戲經綿不捨為樂著不覺不知不驚不怖不謂害命為不覺知既不覺知何緣驚怖火來逼身至無求出意傷逼慧命不以為患經之不狀何應求出是時長者作是思惟我身手有力第三段明佛兼濟既自覺苦欲使物同然故興大悲迬濟之也本無二化乖之受苦自應還用一乘教之故欲設一乘教也身者迹身迹身理能提接為手必能為力也衣裓衣能曲褁子出如神通能崎岴濟物機案四等理言說平若等復更思惟是舍唯有一門第四段將欲與三車之樂無說宅中怖畏之事以恐其情也衆惑所敞為舍狹小教門幽邃遊悟者寡於門成小戀著戲處聖雖誘化而愚稚不識反更戀著五欲戲處或當墮落三塗火也雖欲一化豈可用乎故假廢之矣東西走戲視父而已遍歷五道謂之走旋遊六塵謂之戲但視丈六不達方寸為視父而已爾時長者至已為大火所燒第五段欲與三乘樂也向既說怖畏之事以恐其情其情既懼忽聞三車之美心必樂受非是實教謂之方便也父知諸子先心各有所好衆生所好在於代苦為樂今言三乘之樂是其所好似而非也代苦為樂者於無苦為樂於無為為苦三乘永無有苦豈可同日論哉迹順其情實得牽出苦處方便之極也既無三乘何有彼樂而言有之亦方便也言三乘樂在於滅苦苦既不滅而不顯明又方便也佛化在人小乘從師二譬牛羊是人中物譬支佛既不能化又不從師以譬鹿也三界流轉義如步驟長途之苦理能無為代步之樂以喻車也從教門出於火宅便得之矣故云在門外也爾時諸子至諍出火宅謂是所好故受既受得解而作諸行為走出也從謂致走必務先得為諍前耳若空謂而不解乃反為火燒豈有出期是時長者見諸子等安穩得出第六段向權引與三車之樂今與大車妙一之樂無復諸苦為安隱出也於四衢道在實相無不通理為四衢道定住其中為坐無復結使覆障為露也各白父言父先所許從謂得解雖實知無三未出門外義是未知既出始知無三義亦未是知一故有索所許之義然佛先不許其一不敢索一故報三而索理苟無三自然與一矣索義如此斯則扣一之機冥著為之設辭爾耳車者指二乘盡智無生智是也三界內豈無車乎但不與之名密欲引行者故就極處為車耳大乘者所以佛處既希微玄絶難以接麁以丈六迹得近人故指丈六淺智為車也七住菩薩伏三界結義在宅外其人索也各賜諸子等一大車由索得說三是一理理苟無三今與其一一是未知為與非始與也本已解無豈更假說哉託以悟諸不達耳所以託之良由人情信我不肯受化既聞出者未解須說方知況於己乎便不得不受以成悟也衆寶莊嚴車者表所以大乘妙理無善而不備矣高廣理超數表為高彌綸無極為廣衆寶總八萬四千波羅密為衆寶也衆寶欄楯喻陀羅尼四面懸鈴以喻四辨軒蓋以喻慈悲雜寶七財之寶寶繩況大誓願連綴衆善妙果華瓔七覺花也重敷綩延諸禪定也丹枕喻諸功德相支枕也白牛至其疾如風六通無垢為白牛內外窮淨為膚色充潔理妙因圓為形體姝好無所不摧為大筋力動進中道為行步平正無滅不為疾如風用宣大化入於五道為駕之遊多諸僕從明教作行者宗侍如林也所以者何釋所以等與之意也舍利弗於汝意云何至寧有虗妄不第七段上許與三車今乃與一事乖先言似若虗妄故反質身子明非虗妄但令諸子至全軀命明所以不虗妄若本實欲與三乘而今不與亦不虗妄何以故但令全其慧命斯恩甚重足以補𠎝有何虗哉乃至不與最小一車猶不虗妄而況本無與心今之不與不乖先言豈虗妄乎況復乃與大車則所得多矣如來亦復如是自下亦有七段合上譬也前四段直舉內義以合上譬後三段先稱外譬後以內義合之何耶後三者初說三車次與大車最後非虗妄興教之意亦為一乘一乘之旨顯於後三故先稱而合也前四段為成後三而作故直帖上譬耳世間之父既為物尊故先序妙德從此至成阿耨多羅合上第一譬宅形勢也見諸衆生為生老至雖遭大苦不以為患合上第二譬如來覺知苦也舍利弗佛見是已便作是念我為衆生之父至智慧令其遊戲合上第三譬如來欲以大悲濟物之心舍利弗如來復作是念若我但以神力至佛之智慧合上第四譬將欲與三車之樂故先說怖畏之事舍利弗如彼長者身手有力合上第五譬與三車之樂下備烈三車也舍利弗如彼長者見諸子等安穩得出火宅合上第六與大車譬舍利弗如彼長者以三車誘引合上第七非虗妄譬而說偈言自下重頌上七譬初卅三偈頌第一宅中衆灾譬也略不頌第二門佛覺衆苦以義易知故也屬于一人昔化之機扣聖聖則府應府應在此義曰朽宅屬于佛耳其人近出至忽然火起所以云近出者明出後火起起自衆生非佛為也聖感暫亡謂近出耳昔化淺昧彼自尋乖乖理成橫而有諸苦為忽然火起是時宅主在門外立此下三偈頌第三段佛以大悲濟物如來超出三界為門外立也聞有人言汝諸子等先因遊戲來入此宅昔受化從生為子化理在三界外尋自乖化還耽五欲為遊戲因之受身為來入此宅宅主既來昔緣亦發機以扣聖假為人言聖應遂通必聞之矣告喻諸子自下五偈頌上第四段說宅中怖畏之事是時長者而作是念自下七偈半頌上第五段與三車之樂長者知子得出火宅自下十七偈頌上第六段等與大車也不頌第七不虗妄也造諸大車大乘理無造作子先不知使其始知為造耳告舍利弗我亦如是自下四偈合上第一譬宅形勢也如來已離三界火宅此一偈合第二譬也今此三界皆是我有此二偈合第三譬雖復教詔自下四偈合前第五譬所以不合第四者說怖畏即是與樂故不別合也汝舍利弗我為衆生此一偈合第六譬第七不虗妄證成第六一乘義故不別合也汝等若能信受是語夫唱高必知寡理深必信少前明一乘之道則旨玄致邈冥然絶朕近識之徒取信良難自下明不可妄為人說厲言䔍席向方之徒安得不自鞕信悟之矣法印一乘妙理理無壅滯如王者之印無所不通矣此人罪報將欲流後代於便道宣天下故設得失之軌以誡人也法華經者無義而不包無善而不備若順之者則無福而不集逆之者則無惡而不有故廣列罪福之報以表斯意也信解品第四四大聲聞雖因譬得悟悟既在後迹似未審故自說窮子以表其解解必是審謂之信解亦因茲重明先三後一之道從佛所聞未曾有法昔謂三異今聞是一乃授身子無上道記從佛聞此之音此聞所未聞因此自證所得非望欣喜倍常耳即從座起自下三番序所以歡喜之意也從居僧之首至不復進求阿耨多羅三藐三菩提謂已得證情表望絶第一番也往昔說法既久第二番往日聞佛說波若諸經聞之疲懈唯念空無相而已永無淨佛國土化衆生心也又今年已朽邁第三番既近後邊身春秋朽邁朽邁故於無上道不生一念好樂之心我等今於佛前聞授聲聞無上道記心甚歡喜向三番是自岸之過今忽聞授聲聞記情踊無岸則無量珍寶不求自至歡喜之義顯於茲矣樂說譬喻小乘之人本無大望唯在二乘重為之設譬自下三段明所以無量珍寶不求自得義也第一明四大聲聞昔日已於二萬佛所蒙釋迦道被結乎父子義第二明其神機冥著釋迦府應為說三乘之教第三為其說法華一極之致因此遠顯佛義近助成所聞也譬若有人年既幼稚第一段明父子義昔受菩薩時化化理本一一從佛生為子佛即父也受化始爾為幼稚也捨父逃逝受化始爾果未來至還深世或或走正道皆化而去為捨父逃逝久住他國化境自然為本國生死橫造為他國去化日遠為人留滯為住也或十草至五十歲五言五道十言住久不定故或也年既長大加復窮困去化既久為長大跉跰生死為窮困也馳騁四方以求衣食周遍五道無處不求為馳騁四方長則求於大樂譬樂窮則求於小樂也漸漸遊行遇向本國或報不可頓受為漸漸之非本處為遊行化勢應還歸悟為向本國緣潛牽來非意欲爾為遇也其父先來求子不得中止一城第二段成佛為說三乘之教佛昔既化積行常欲求子子或墮在生死事乖為不得今子昔緣應至而著生死樂情異於本父應府就人身作佛迹不及實為中止一乘之理可以防非為城十方歸化為一也其家大富財寶無量雖在人身作佛處理無非法斯則富有法財而無窮極金銀琉璃至悉皆盈溢七聖財寶無能𨶳闞為倉庫理過於言為盈溢多有僮僕臣佐吏民至牛羊無數外道為僮衆魔為僕必歸從化義曰僮僕菩薩為臣佐助宣正化聲聞為吏防撿邪非三界衆生為民佛所統王也象馬牛羊者三乘五通諸功德也車者理運無方也出入息利乃遍他國外化為出出化彼行為息利利入所化周在五道為遍他國商估價客亦甚衆多菩薩受法以化十方為販賣者也時貧窮子遊諸聚落至所止之城昔緣牽向父所止城理為至也父每念子至五十餘年慈悲之念念之乖理而子受化之後迷淪五道為五十年也而未曾向人說如此事謂未曾向人說二乘成佛佛之大慈本欲拔苦而彼樂生死真化則逆要須權三三順微心然後可造之一也但自思惟心懷悔恨唯恨本化不濃致使還或流轉悉為慈悲無方設辭耳自念老朽至每憶其子老朽者謂後邊身也無有息謂未說二乘作佛慮無上法寶無所付嗣也爾時窮子傭賃展轉遇到父舍住立門側昔所行善以取世樂為傭賃而實非善受故自昔緣為潛到父舍大乘之說為父舍所由出處為門本緣應入而情牽不受故躊躇其側遙見其父踞師子床寶機承足昔緣使見大乘說旨為遙見父理為法身所處無畏踞師子床住足恆在無為為寶機承其足也諸婆羅門至恭敬圍繞如此諸天皆自持憍傲而皆宗事者理伏之然也以真珠瓔珞莊嚴其身形無非法則是法寶莊嚴其身也吏民僮僕手執白拂侍立左右奉教信手執無漏慧拂義為侍立左右拂塵嚚也羅列寶物出內取與陳顯法相必使彼得彼得乃義歸於己為取與也窮子見父有大力勢即懷恐怖悔來至此父理能伏其情為有力勢伏情之所畏為恐怖含大之機扣聖為見父而情或翳心未能受大為悔來至此竊作是念至非得物之處含大之機未著廣設辭如此不如往至貧里三界為貧里修五戒十善求人天之樂為易得也若久住或見逼迫久住必使行大道使行大道者必為物為物者功不在我功不在我者使見強使為他作也疾走不樂之至患去速也見子便識心大歡喜昔緣微發為見子子今雖復情逆後必悟大是故歡喜冥機微至而己不知為忽自來即遣傍人丈六非所以佛為傍人傍人欲設大化為遣使往大是先急為追也疾走往捉大乘妙法為堅執之理理不容間為疾也窮子驚愕至何為見捉出非本意為驚愕甚逆其情為稱怨大喚猶無犯而致執也使者執之逾急大乘執之轉功其情理終不捨為強牽也于時窮子自念無罪至悶絶躃地情甚不樂有過無罪而致執大化其乖其心為悶絶躃地也父遙見之至勿強將來廢不作大化之念假語前使云爾耳以冷水灑面若稱以大化化之則悶絶矣今但息大化其便醒悟水灑面者以表此義也使者語之我今放汝者亦假語云爾密遣二人形色憔悴無威德者二人者為二乘法作念欲施此為遣隱實為密理不光圓為形色憔悴內解不明為無威德如此之人則非王使也汝可詣彼至倍與汝直順情非本為徐語使作行而與樂為作處所與超於世間倍與直也我等二人亦共汝作法在人行為共作也窮子先取其價受使所語為先取其價情怙無疑為尋與除糞又以他日至污穢不淨神通寄在六情為窗牖中見身非功德所成為羸疲結使受之為塵坌不淨也即脫瓔珞至塵垢坌身隱法身妙餝為脫瓔珞之具示菩薩作佛不虗外好為著垢膩之衣亦是結使所受生為塵土坌身也右手執持除糞之器狀有所畏不行無漏為執除糞器便易為右手似若防漏為狀有所畏也語作人汝等勤作鹿野轉法輪時義言如此也以方便故得近其子佛理絶人府示得接耳後復告言至當加汝價入無漏道後定不還生死為常此作不復餘去所得之樂過七方便為加汝價也諸所須至須者相給無漏諸功德無所乏少為鹽酢之屬二乘神通本自局弱為老蔽使人也無有欺怠至如餘作人其情安小乘法謂之不見汝有此諸惡如餘作人餘作人者謂七方便七方便則有此惡也名之為兒得無漏名似佛子未言真子耳窮子雖欣此遇至常令除糞見諦思惟各十謂草年也出入無難使聞大乘則出入此理無疑難也然其所止猶在本處聞說大乘教已使知是己之有彼尚未領為猶在本處也爾時長者有至無令漏失既知使說大乘諸經如命須菩提說波若為以悉付教是其物爾時窮子即受教勑至亦未能捨雖受委付猶未知是己之物情故如此復經少時父知子意漸已通泰第三段其心轉曠懷大之機顯自下會諸親族名之為兒斯則為說法華經也於某城中於昔二萬億佛所已受化化功未淳遂捨吾逃逝遁三界也跉跰飄流五道備嘗苦辛自然而至上三段釋所以無上之寶者自然至義顯此也大富長者則是如來自下三番合上三譬此合第一譬父子義以三苦故佛說三受以為三苦苦劇說為苦苦果變說為壞苦非苦非樂念念遷其命過說為行苦今言以三苦故者即以三受也何者苦受楚切乖情起瞋適故起愛不苦不樂恬恬起癡由斯三受興三不善根三不善根既感發動諸使諸使紛熾作身口業業使相與招未來報故言以三苦受諸熱惱既為生死所惱則所習非勝為迷惑無知樂著小法自此即合背化流通之事也今日世尊令我等思惟蠲除合第二譬為說三乘教也一日之價貶小乘自足之心取其曠時積行之功以比菩薩一日而已有少乏極今我等方知世尊於佛智慧無所吝惜合第三說法花也偈言初二偈頌品始三番次兩偈頌第一譬求之既疲自下卅二偈頌第二譬也注記券疏笇計寶物者謂說三乘法授菩薩記謂券疏也薦席厚暖譬泥洹中樂無不厚足止宿草菴作大乘門外宿小乘菴也父知子心漸已曠大自下七偈頌第三譬佛亦如是自下領略頌內義殊不委備臨時宜之悉皆空寂明所以無欣樂大意以諸法性空難可窮究窮究乃得成佛以是不欣也
